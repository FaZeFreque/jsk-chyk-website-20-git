<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHYK | Read</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@300;400;600;700&family=Anton&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/mobile-fix.css">
  <link rel="stylesheet" href="css/desktop-extra.css">
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="https://unpkg.com/@studio-freight/lenis@1.0.39/dist/lenis.min.js"></script>
</head>
<body class="article-reader-page">
  <div class="cursor-dot"></div><div class="cursor-ring"></div><div class="page-transition-overlay"></div>
  <button class="article-reader-desktop-back" id="article-reader-desktop-back" type="button" aria-label="Return to publications">
    <span aria-hidden="true">&#8592;</span> Publications
  </button>
  <header class="site-header" id="site-header">
    <div class="header-inner">
      <a href="index.html" class="header-logo"><img src="assets/site/branding/chyk-logo-white.png" alt="CHYK" class="logo-img"><span class="logo-text">CHYK</span></a>
      <nav class="desktop-nav">
        <a href="content-hub.html" class="nav-link">Content Hub</a>
        <a href="talks-and-articles.html" class="nav-link">Talks &amp; Articles</a>
        <a href="magazine.html" class="nav-link">Publications</a>
        <a href="social.html" class="nav-link">Social</a>
        <a href="join.html" class="nav-link nav-cta magnetic-btn">Join CHYK</a>
      </nav>
      <a href="magazine.html" class="article-reader-mobile-back">Back</a>
    </div>
  </header>

  <main class="article-reader-shell" id="article-reader-shell">
    <div class="article-reader-progress" id="article-reader-progress"></div>
    <article class="article-reader" id="article-reader">
      <a class="article-reader-back" href="magazine.html">Back to Publications</a>
      <header class="article-reader-header">
        <p class="article-reader-source" id="article-reader-source"></p>
        <h1 id="article-reader-title">Loading article...</h1>
        <p class="article-reader-deck" id="article-reader-deck"></p>
        <div class="article-reader-meta"><span id="article-reader-author"></span><span id="article-reader-time"></span></div>
      </header>
      <div class="article-reader-cover"><img id="article-reader-image" src="" alt=""></div>
      <div class="article-reader-body" id="article-reader-body"></div>
      <footer class="article-reader-footer">
        <p>Continue exploring thoughtful writing from the CHYK community.</p>
        <a href="magazine.html" class="btn btn-primary">More Publications</a>
      </footer>
    </article>
  </main>

  <script src="data/articles.js"></script>
  <script src="data/article-content.js"></script>
  <script src="js/base.js"></script>
  <script src="js/article-reader.js"></script>
</body>
</html>
