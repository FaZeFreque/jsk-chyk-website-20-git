<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CHYK Visual Editor — Locked</title>
<style>
  :root { --gold:#c9a24a; --bg:#0c0b09; --panel:#14120e; --line:#2a261d; --text:#efeadf; --dim:#8d8676; --red:#e06c5c; }
  * { box-sizing:border-box; }
  html,body { height:100%; margin:0; }
  body { background:var(--bg); color:var(--text); font:14px/1.5 Inter,"Segoe UI",system-ui,sans-serif; display:flex; align-items:center; justify-content:center; }
  .card { width:min(360px,92vw); background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:26px 24px; box-shadow:0 20px 60px rgba(0,0,0,.5); }
  .brand { font-weight:800; letter-spacing:3px; color:var(--gold); font-size:15px; text-align:center; }
  .brand b { color:var(--text); font-weight:300; }
  h1 { font-size:15px; font-weight:600; margin:18px 0 4px; text-align:center; }
  p.sub { color:var(--dim); font-size:12px; text-align:center; margin:0 0 18px; }
  label { display:block; color:var(--dim); font-size:11px; letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
  input { width:100%; background:#0f0e0b; color:var(--text); border:1px solid var(--line); border-radius:8px; padding:10px 12px; font:inherit; }
  input:focus { outline:1.5px solid var(--gold); }
  button { width:100%; margin-top:14px; background:var(--gold); color:#14110a; border:none; border-radius:8px; padding:10px; font:600 14px Inter,sans-serif; cursor:pointer; }
  button:hover { filter:brightness(1.08); }
  .err { color:var(--red); font-size:12px; min-height:16px; margin-top:10px; text-align:center; }
</style>
</head>
<body>
  <form class="card" id="gate">
    <div class="brand">CHYK<b>EDITOR</b></div>
    <h1>Developer Mode is locked</h1>
    <p class="sub">Enter the password to open the Visual Editor.</p>
    <label for="pw">Password</label>
    <input id="pw" type="password" autocomplete="current-password" autofocus>
    <button type="submit">Unlock</button>
    <div class="err" id="err"></div>
  </form>
<script>
  var form = document.getElementById('gate');
  var err = document.getElementById('err');
  form.addEventListener('submit', function (e) {
    e.preventDefault();
    err.textContent = '';
    fetch('/api/visual-login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ password: document.getElementById('pw').value }) })
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
      .then(function (res) {
        if (res.ok) location.replace('/visual-editor/');
        else { err.textContent = res.j.error || 'Incorrect password.'; document.getElementById('pw').select(); }
      })
      .catch(function () { err.textContent = 'Could not reach the local server.'; });
  });
</script>
</body>
</html>
